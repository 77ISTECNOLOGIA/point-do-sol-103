<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>QR Code — Point do Sol 103</title>
<style>
  @media print {
    body { background: white !important; }
    .card { box-shadow: none !important; border: 2px solid #2A1B5C !important; }
  }
  body {
    font-family: 'Segoe UI', Tahoma, sans-serif;
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    min-height: 100vh; margin: 0;
    background: linear-gradient(180deg, #FFF8DC 0%, #FFFAF0 100%);
  }
  .card {
    background: white;
    border-radius: 20px;
    padding: 2rem;
    text-align: center;
    box-shadow: 0 4px 24px rgba(42,27,92,0.15);
    max-width: 320px;
    border: 3px solid #FFD700;
    position: relative;
    overflow: hidden;
  }
  .card::before {
    content: '';
    position: absolute;
    top: -10px; right: -10px;
    width: 80px; height: 80px;
    background-image: radial-gradient(circle, #2A1B5C 2px, transparent 2px);
    background-size: 10px 10px;
    opacity: 0.3;
  }
  .logo-sol {
    width: 70px; height: 70px;
    background: #FFD700;
    border-radius: 50%;
    margin: 0 auto 0.5rem;
    display: flex; align-items: center; justify-content: center;
    font-size: 2rem;
    border: 3px solid #FFEB3B;
    box-shadow: 0 0 20px rgba(255,215,0,0.4);
  }
  h1 {
    color: #2A1B5C;
    font-size: 1.3rem;
    margin: 0.3rem 0 0.1rem;
    letter-spacing: 0.05em;
    font-weight: 900;
  }
  .numero {
    color: #4B2A8C;
    font-size: 0.9rem;
    font-weight: bold;
    margin-bottom: 0.6rem;
  }
  .frases { margin: 0.8rem 0 1rem; }
  .frase { font-size: 0.8rem; margin: 4px 0; }
  .frase-pt { color: #2A1B5C; font-weight: 600; }
  .frase-en, .frase-es { color: #888; }
  img.qr {
    width: 220px; height: 220px;
    border: 2px solid #FFD700;
    border-radius: 8px;
    padding: 4px;
    background: white;
  }
  .link {
    font-size: 0.7rem;
    color: #4B2A8C;
    margin-top: 0.75rem;
    word-break: break-all;
    font-weight: bold;
  }
</style>
</head>
<body>
  <div class="card">
    <div class="logo-sol">😎</div>
    <h1>POINT DO SOL</h1>
    <div class="numero">— 103 —</div>
    <img class="qr" src="https://api.qrserver.com/v1/create-qr-code/?size=220x220&data=https://point-do-sol-103.vercel.app&color=2A1B5C&bgcolor=ffffff&qzone=2&format=png" alt="QR Code Point do Sol 103">
    <div class="frases">
      <p class="frase frase-pt">📱 Escaneie para ver o cardápio digital</p>
      <p class="frase frase-en">📱 Scan to see the digital menu</p>
      <p class="frase frase-es">📱 Escanea para ver el menú digital</p>
    </div>
  </div>
</body>
</html>
